databases:
  - name: gig-manager-db
    plan: starter  # Esto debería costar alrededor de $7-$8 al mes

services:
  # Servicio Web
  - type: web
    name: gig-manager-web
    env: docker
    plan: free   # Cambia a 'free' para que no tenga costo mensual
    healthCheckPath: "/"
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "1"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: gig-manager-db
          property: connectionString